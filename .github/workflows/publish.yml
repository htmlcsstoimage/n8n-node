# After CI succeeds for a push to main, publishes the tested package version
# when it does not yet exist on npm. After publishing, the workflow creates the
# matching annotated Git tag (for example, v0.1.1).
#
# npm Trusted Publishing is configured for:
#   Organization: htmlcsstoimage
#   Repository:   n8n-node
#   Workflow:     publish.yml
#   Action:       npm publish
#
# No npm token or GitHub Actions secret is required.

name: Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish new version
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    permissions:
      # Required for npm trusted publishing and provenance.
      id-token: write
      # Required to create the version tag after a successful publish.
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          # Publish the exact commit that completed CI, not a newer main commit.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Check package version
        id: version
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          tag="v${package_version}"

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} already exists on npm."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is new and will be published."
          fi

      - name: Install dependencies
        if: steps.version.outputs.publish == 'true'
        run: npm ci

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        # In GitHub Actions, n8n-node release lints, builds, and runs npm publish.
        # npm authenticates through trusted publishing and attaches provenance.
        run: npm run release

      - name: Create version tag
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "${TAG} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${TAG}" --message "Release ${TAG}"
          git push origin "${TAG}"
